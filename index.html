<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IS Agent Alpha | Autonomous Trend Scraper</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://js.puter.com/v2/"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>IS_AGENT_v1.3</h1>
            <div id="status-container">
                <span id="pulse" class="idle"></span>
                <span id="status-text">System Standby</span>
            </div>
        </header>

        <main>
            <div id="log-window">
                <div class="log-entry">[SYSTEM] Waiting for initialization...</div>
            </div>
            
            <div class="controls">
                <button id="start-btn" class="primary-btn">Initiate Scan</button>
                <button id="auto-btn" class="secondary-btn">Toggle Autonomy: OFF</button>
            </div>
        </main>
    </div>
    <script src="agent.js"></script>
</body>
</html>
