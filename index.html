<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IS Agent Alpha | Continuous Autonomy</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://js.puter.com/v2/"></script>
</head>
<body>
    <div class="agent-card">
        <div class="header">
            <h1 style="margin:0; font-size: 1.2rem; color: #00a3ff;">IS_AGENT_ALPHA</h1>
            <div id="status-badge" class="status-badge">System Idle</div>
        </div>

        <div id="log-window">
            <div>[SYSTEM] Initializing core modules...</div>
        </div>
        
        <div class="controls">
            <button id="start-btn">RUN SINGLE SCAN</button>
            <button id="auto-btn">TOGGLE CONTINUOUS AUTONOMY</button>
        </div>
    </div>
    <script src="agent.js"></script>
</body>
</html>
