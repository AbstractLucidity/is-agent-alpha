<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IS Autonomous Agent</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>IS <span class="accent">Learning Agent</span></h1>
            <div class="status-badge">
                <span id="pulse" class="idle">●</span> 
                Status: <span id="status-text">Ready</span>
            </div>
        </header>

        <div id="log-window"></div>
            
        <div class="controls">
            <button id="start-btn" class="primary">Initiate Search</button>
            <button id="auto-btn" class="secondary">Toggle Autonomy</button>
        </div>
    </div>
    <script src="agent.js"></script>
</body>
</html>
